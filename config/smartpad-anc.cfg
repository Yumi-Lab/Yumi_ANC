## Yumi-ANC — Active Noise Canceling
## Zero-pause microphone-based resonance calibration.
## Recording runs continuously in background, moves chain without pause.
## Zones are stored in resonance_zones.cfg (auto-managed, no include needed).

[resonance_avoidance]
## Module loads zones from resonance_zones.cfg automatically.
## No calibration yet = no zones = ANC inactive. Run ACOUSTIC_SPEED_SWEEP to calibrate.

[gcode_shell_command acoustic_sweep]
command: python3 /home/pi/printer_data/scripts/acoustic_sweep.py
timeout: 600
verbose: True

[gcode_macro ACOUSTIC_SPEED_SWEEP]
description: Yumi-ANC — Run microphone-based resonance calibration
variable_speed_min: 20
variable_speed_x_step: 10
variable_speed_y_step: 10
variable_speed_z_step: 1
variable_speed_z_min: 5
gcode:
    {% set axes_param = params.AXES|default("XYZD")|upper %}
    {% set speed_min = params.SPEED_MIN|default(printer["gcode_macro ACOUSTIC_SPEED_SWEEP"].speed_min)|int %}
    {% set x_step = params.X_STEP|default(printer["gcode_macro ACOUSTIC_SPEED_SWEEP"].speed_x_step)|int %}
    {% set y_step = params.Y_STEP|default(printer["gcode_macro ACOUSTIC_SPEED_SWEEP"].speed_y_step)|int %}
    {% set z_step = params.Z_STEP|default(printer["gcode_macro ACOUSTIC_SPEED_SWEEP"].speed_z_step)|int %}
    {% set z_min = params.Z_SPEED_MIN|default(printer["gcode_macro ACOUSTIC_SPEED_SWEEP"].speed_z_min)|int %}
    {% set z_max = printer.configfile.settings.printer.max_z_velocity|default(25)|int %}

    {% set x_max = printer.configfile.settings.stepper_x.position_max|float %}
    {% set y_max = printer.configfile.settings.stepper_y.position_max|float %}
    {% set z_max_pos = printer.configfile.settings.stepper_z.position_max|float %}
    {% set max_vel = printer.configfile.settings.printer.max_velocity|float %}
    {% set max_acc = printer.configfile.settings.printer.max_accel|float %}
    {% set kin = printer.configfile.settings.printer.kinematics %}

    # Auto-detect Y max speed from kinematics
    # cartesian (bedslinger) = Y moves the heavy bed, cap speed
    # corexy/corexz = X and Y both on gantry, same speed
    {% if kin == "cartesian" %}
        {% set y_speed_max = params.Y_SPEED_MAX|default((max_vel / 2)|int)|int %}
    {% else %}
        {% set y_speed_max = speed_max %}
    {% endif %}

    {% set m = 25 %}
    {% set x0 = m %}
    {% set x1 = (x_max - m)|int %}
    {% set y0 = m %}
    {% set y1 = (y_max - m)|int %}
    {% set z0 = 50 %}
    {% set z1 = (z_max_pos - 20)|int %}
    {% set cx = (x_max / 2)|int %}
    {% set cy = (y_max / 2)|int %}

    {% set x_speed_max = max_vel|int %}
    {% if y_speed_max > max_vel %}
        {% set y_speed_max = max_vel|int %}
    {% endif %}

    SAVE_GCODE_STATE NAME=anc_state
    SET_VELOCITY_LIMIT VELOCITY={x_speed_max} ACCEL={max_acc}

    # Disable ANC during calibration — must test all speeds unmodified
    {% if printer["resonance_avoidance"] is defined %}
        RESONANCE_AVOIDANCE_DISABLE
        RESPOND MSG="ANC disabled for calibration"
    {% endif %}

    M117 Yumi-ANC starting...
    RESPOND MSG="Yumi-ANC: axes={axes_param} X:{speed_min}-{x_speed_max}(step{x_step}) Y:{speed_min}-{y_speed_max}(step{y_step}) Z:{z_min}-{z_max}(step{z_step}) kin={kin}"

    G28

    # Note: fans are driver-powered, not controllable via M106

    G90
    G1 Z{z0} F1000
    G1 X{cx} Y{cy} F5000
    M400
    G4 P5000
    RESPOND MSG="Machine settled — recording baseline..."

    # Start background recording + baseline (3s blocking)
    RUN_SHELL_COMMAND CMD=acoustic_sweep PARAMS="start {speed_min} {x_speed_max} {x_step}"
    G4 P500

    # Travel distance per axis
    {% set x_travel = x1 - x0 %}
    {% set y_travel = y1 - y0 %}

    # ==================== X AXIS ====================
    {% if "X" in axes_param %}
        RESPOND MSG="=== X AXIS ==="
        {% for speed in range(speed_min, x_speed_max + 1, x_step) %}
            RUN_SHELL_COMMAND CMD=acoustic_sweep PARAMS="mark {speed} x"
            # Enough passes to get ~2s of constant-speed audio
            # time_one_pass = travel / speed, passes = ceil(2 / time_one_pass)
            {% set time_pass = x_travel / speed %}
            {% set passes = [(2.0 / time_pass)|round(0, 'ceil')|int, 2]|max %}
            {% for p in range(passes) %}
                {% if p % 2 == 0 %}
                    G1 X{x1} F{speed * 60}
                {% else %}
                    G1 X{x0} F{speed * 60}
                {% endif %}
            {% endfor %}
        {% endfor %}
        G1 X{cx} F{max_vel * 60}
    {% endif %}

    # ==================== Y AXIS ====================
    {% if "Y" in axes_param %}
        RESPOND MSG="=== Y AXIS (max {y_speed_max} mm/s — {kin}) ==="
        {% for speed in range(speed_min, y_speed_max + 1, y_step) %}
            RUN_SHELL_COMMAND CMD=acoustic_sweep PARAMS="mark {speed} y"
            {% set time_pass = y_travel / speed %}
            {% set passes = [(2.0 / time_pass)|round(0, 'ceil')|int, 2]|max %}
            {% for p in range(passes) %}
                {% if p % 2 == 0 %}
                    G1 Y{y1} F{speed * 60}
                {% else %}
                    G1 Y{y0} F{speed * 60}
                {% endif %}
            {% endfor %}
        {% endfor %}
        G1 Y{cy} F{max_vel * 60}
    {% endif %}

    # ==================== XY DIAGONAL (experimental) ====================
    {% if "D" in axes_param %}
        RESPOND MSG="=== XY DIAGONAL (45°) ==="
        {% set diag_max = [x_speed_max, y_speed_max]|min %}
        {% for speed in range(speed_min, diag_max + 1, x_step) %}
            RUN_SHELL_COMMAND CMD=acoustic_sweep PARAMS="mark {speed} d"
            {% set time_pass = x_travel / speed * 1.41 %}
            {% set passes = [(2.0 / time_pass)|round(0, 'ceil')|int, 2]|max %}
            {% for p in range(passes) %}
                {% if p % 2 == 0 %}
                    G1 X{x1} Y{y1} F{speed * 60}
                {% else %}
                    G1 X{x0} Y{y0} F{speed * 60}
                {% endif %}
            {% endfor %}
        {% endfor %}
        G1 X{cx} Y{cy} F{max_vel * 60}
    {% endif %}

    # ==================== Z AXIS ====================
    {% if "Z" in axes_param %}
        RESPOND MSG="=== Z AXIS ==="
        # Start from top so first move (down) is at test speed
        G1 Z{z1} F1000
        {% for speed in range(z_min, z_max + 1, z_step) %}
            RUN_SHELL_COMMAND CMD=acoustic_sweep PARAMS="mark {speed} z"
            G1 Z{z0} F{speed * 60}
            G1 Z{z1} F{speed * 60}
        {% endfor %}
        G1 Z{z0} F1000
    {% endif %}

    # Stop recording + analyze + generate config
    RUN_SHELL_COMMAND CMD=acoustic_sweep PARAMS="stop"

    G1 X{cx} Y{cy} F5000
    M117 Yumi-ANC complete!
    RESPOND MSG="Yumi-ANC done. See http://<ip>/anc.html — use Apply to Klipper button."

    RESTORE_GCODE_STATE NAME=anc_state

[gcode_macro ACOUSTIC_STOP]
description: Stop ANC calibration in progress
gcode:
    RUN_SHELL_COMMAND CMD=acoustic_sweep PARAMS="stop"
    M117 ANC stopped.
    RESPOND MSG="Yumi-ANC stopped. Partial results may be available."

[gcode_macro ACOUSTIC_SHOW_RESULTS]
description: Display detected resonance avoidance zones
gcode:
    {% if printer["resonance_avoidance"] is defined %}
        {% set ra = printer["resonance_avoidance"] %}
        RESPOND MSG="Yumi-ANC: {'ENABLED' if ra.enabled else 'DISABLED'}, margin=+/-{ra.margin} mm/s"
        {% if ra.zones_x %}
            RESPOND MSG="  X: {ra.zones_x|join(', ')} mm/s"
        {% endif %}
        {% if ra.zones_y %}
            RESPOND MSG="  Y: {ra.zones_y|join(', ')} mm/s"
        {% endif %}
        {% if ra.moves_total > 0 %}
            RESPOND MSG="  Stats: {ra.moves_clamped}/{ra.moves_total} moves clamped"
        {% endif %}
    {% else %}
        RESPOND MSG="No [resonance_avoidance] config. Run ACOUSTIC_SPEED_SWEEP first."
    {% endif %}

[gcode_macro ACOUSTIC_CLEAR_ZONES]
description: Remove all resonance avoidance zones
gcode:
    RUN_SHELL_COMMAND CMD=acoustic_sweep PARAMS="clear"
    RESPOND MSG="ANC zones cleared."
